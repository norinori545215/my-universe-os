<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Universe OS</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/111111/00ffcc.png?text=OS">
    <link rel="icon" href="data:,">
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <canvas id="universe-canvas"></canvas>
    
    <script type="module" src="./src/main.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((registration) => {
                    console.log('[OS System] PWA Engine Activated: ', registration.scope);

                    // 新しいバージョンのOSが降ってきたかを監視
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('🔄 新しい宇宙の法則を検知。システムを更新します...');
                                setTimeout(() => window.location.reload(), 500);
                            }
                        });
                    });
                }).catch((error) => {
                    console.error('[OS System] PWA Engine Failed: ', error);
                });

                // Service Workerが切り替わった時にもリロードする
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        window.location.reload();
                        refreshing = true;
                    }
                });
            });
        }
    </script>
</body>
</html>
